name: ci
on:
  workflow_dispatch: 


permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: jfrog-fastci/fastci@v0
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v6
        with:
          cache-from: type=gha,scope=ripgrep
          cache-to: ${{ github.ref == 'refs/heads/master' && 'type=gha,mode=max,scope=ripgrep' || ''}}
          push: false
          tags: user/app:latest
          outputs: type=image,name-canonical=true
